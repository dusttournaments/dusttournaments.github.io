name: Update Tournament Data

on:
  schedule:
    # Runs once every 24 hours, at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Fetch tournaments from Challonge community page
        run: python fetch_tournaments.py

      - name: Commit updated tournaments.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tournaments.json
          git diff --staged --quiet || git commit -m "Update tournament data"
          git push
